name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Create sample training data
      run: |
        mkdir -p artifacts

    - name: Train model for testing
      run: |
        python train.py --input data/sample_customers.csv --artifacts_dir artifacts

    - name: Run linting
      run: |
        flake8 api/ train.py --max-line-length=120 --extend-ignore=E203,W503
        black --check api/ train.py tests/
        isort --check-only api/ train.py tests/

    - name: Run type checking
      run: |
        mypy api/main.py train.py --ignore-missing-imports
      continue-on-error: true

    - name: Run tests with coverage
      run: |
        pytest --cov=api --cov=train --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Train model for Docker
      run: |
        python -m pip install --upgrade pip
        pip install -r api/requirements.txt
        python train.py --input data/sample_customers.csv --artifacts_dir artifacts

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: api/Dockerfile
        push: false
        tags: customer-segmentation-api:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        docker build -f api/Dockerfile -t customer-segmentation-api:test .
        docker run -d -p 8000:8000 --name test-api customer-segmentation-api:test
        sleep 10
        curl -f http://localhost:8000/health || exit 1
        docker stop test-api

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
